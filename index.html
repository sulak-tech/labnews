<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigitalLabNews - ข่าวสารประกาศ</title>

  <!-- โหลดฟอนต์ Noto Sans Thai -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Noto Sans Thai', sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    header {
      background: #1f4e79;
      color: white;
      padding: 30px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    header p {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.9;
    }

    .content {
      padding: 30px;
    }

    .news-item {
      border-bottom: 1px solid #e0e0e0;
      padding: 20px 0;
    }

    .news-item:last-child {
      border-bottom: none;
    }

    .date {
      font-size: 14px;
      color: #777;
      margin-bottom: 8px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #1f4e79;
    }

    .description {
      font-size: 16px;
      line-height: 1.6;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #fafafa;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>DigitalLabNews</h1>
      <p>หน้าแจ้งข่าวสารและประกาศสำคัญ</p>
    </header>

    <div class="content">
      <div class="news-item">
        <div class="date">28 เมษายน 2026</div>
        <div class="title">ประกาศปรับปรุงระบบเว็บไซต์</div>
        <div class="description">
          เว็บไซต์จะมีการปรับปรุงระบบในวันศุกร์นี้ เวลา 22:00 - 23:30 น.
          ระหว่างเวลาดังกล่าวอาจไม่สามารถเข้าใช้งานได้ตามปกติ
          ขออภัยในความไม่สะดวก
        </div>
      </div>

    <footer>
      © 2026 Digital Technology Laboratory | All Rights Reserved
    </footer>
  </div>
</body>
</html>
